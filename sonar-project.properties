# =============================================
# SONARQUBE PROJECT CONFIGURATION
# =============================================

# Project ki unique ID (koi bhi naam do, spaces nahi)
sonar.projectKey=my-vite-app

# Dashboard mein dikhne wala naam
sonar.projectName=My Vite React App

# Version number
sonar.projectVersion=1.0

# Source code kahan hai
sonar.sources=src

# Test files exclude karo (optional)
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.js,**/*.spec.js

# JavaScript/TypeScript ke liye
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
